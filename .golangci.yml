version: "2"
run:
  timeout: 5m
linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - ineffassign
    - cyclop
    - funlen
    - gocognit
    - dupl
  settings:
    cyclop:
      max-complexity: 20
    funlen:
      lines: 80
      statements: 50
    gocognit:
      min-complexity: 16
    errcheck:
      check-blank: false
  exclusions:
    presets:
      - comments
    paths:
      - .*_test\.go$
      - .*testutil.*
    rules:
      - path: _test\.go$
        linters:
          - gocognit
          - funlen
          - errcheck
          - cyclop
      - path: testutil
        linters:
          - gocognit
          - funlen
          - errcheck
          - cyclop
      - linters:
          - errcheck
        text: "Error return value of `(.*\\.Close|.*\\.Stop|.*\\.Remove|io\\.Copy|.*\\.MkdirAll|.*\\.Disconnect|.*\\.LastInsertId|.*\\.RowsAffected|time\\.Parse|.*\\.Write)` is not checked"
  formatters:
    enable:
      - goimports
      - gofumpt
