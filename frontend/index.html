<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      try {
        document.documentElement.classList.toggle('light', localStorage.getItem('mssh:color-mode') === 'light')
      } catch (error) {
        document.documentElement.classList.remove('light')
      }
    </script>
    <title>MSSH</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
