# This file contains the configuration for this project.
version: '3'

info:
  companyName: "MSSH"
  productName: "MSSH"
  productIdentifier: "com.mssh.app"
  description: "A cross-platform SSH client"
  copyright: "(c) 2026, MSSH"
  comments: "SSH Client"
  version: "0.1.0"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
      - build
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
    git_ignore: true
  executes:
    - cmd: npm install
      dir: frontend
      type: once
    - cmd: npm run dev
      dir: frontend
      type: background
    - cmd: CGO_ENABLED=1 /root/.govm/go/bin/go mod tidy
      type: blocking
    - cmd: CGO_ENABLED=1 /root/.govm/go/bin/go run .
      type: primary

fileAssociations: []

other: []
