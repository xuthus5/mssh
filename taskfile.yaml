version: '3'

tasks:
  dev:
    desc: 启动开发模式
    cmds:
      - cmd: PATH="$HOME/.govm/go/bin:$PATH" CGO_ENABLED=1 wails3 dev -port 5173
        platforms: [linux]
      - cmd: PATH="$HOME/.govm/go/bin:$PATH" wails3 dev -port 5173
        platforms: [darwin]
      - cmd: powershell -NoProfile -Command "$env:PATH=\"$env:USERPROFILE\.govm\go\bin;$env:PATH\"; wails3 dev -port 5173"
        platforms: [windows]

  build:
    desc: 生产构建
    cmds:
      - cd frontend && npm run build
      - cmd: GO_BIN="$HOME/.govm/go/bin/go"; [ -x "$GO_BIN" ] || GO_BIN="$(command -v go)"; CGO_ENABLED=1 "$GO_BIN" build -o build/bin/mssh .
        platforms: [linux]
      - cmd: GO_BIN="$HOME/.govm/go/bin/go"; [ -x "$GO_BIN" ] || GO_BIN="$(command -v go)"; "$GO_BIN" build -o build/bin/mssh .
        platforms: [darwin]
      - cmd: powershell -NoProfile -Command "$go=\"$env:USERPROFILE\.govm\go\bin\go.exe\"; if (-not (Test-Path $go)) { $go=(Get-Command go).Source }; & $go build -o build/bin/mssh.exe ."
        platforms: [windows]

  compile:
    desc: 编译 Go + 构建前端（同 build）
    cmds:
      - task: build

  lint:
    desc: 运行 golangci-lint
    cmds:
      - golangci-lint run --timeout 5m ./...

  fmt:
    desc: 格式化代码
    cmds:
      - golangci-lint run --fix ./...
      - goimports-reviser -rm-unused -format ./...

  test:
    desc: 运行测试 + 覆盖率
    cmds:
      - go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - go tool cover -func=coverage.out

  test:e2e:
    desc: 运行真实 SSH、tmux 与 SFTP 集成测试
    cmds:
      - go test -race -tags=e2e ./e2e -run 'TestCommercialSSHWorkflow|TestConcurrentResourcesReturnToBaseline' -count=1 -timeout=2m

  benchmark:
    desc: 运行商业性能基准
    cmds:
      - go test -run '^$' -bench 'BenchmarkCommercial' -benchmem ./internal/store ./internal/service

  clean:
    desc: 清理临时产物
    cmds:
      - cmd: rm -f coverage.out build/bin/mssh
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "Remove-Item coverage.out,build/bin/mssh.exe -Force -ErrorAction SilentlyContinue"
        platforms: [windows]
      - go clean -testcache
