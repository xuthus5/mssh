version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml

vars:
  APP_NAME: mssh
  BIN_DIR: bin
  VITE_PORT: '{{.WAILS_VITE_PORT | default 5173}}'
  APP_VERSION:
    sh: |
      set -e
      if [ -n "${APP_VERSION:-}" ]; then
        printf '%s' "$APP_VERSION" | tr -d '\r' | head -n1 | sed 's/^v//'
        exit 0
      fi
      tag="$(git describe --tags --exact-match 2>/dev/null || true)"
      if [ -n "$tag" ]; then
        printf '%s' "$tag" | sed 's/^v//'
        exit 0
      fi
      printf '%s' '0.1.0'
  VERSION_LDFLAGS: '-X github.com/xuthus5/mssh/internal/service.Version={{.APP_VERSION}}'

tasks:
  build:
    summary: Builds the application for the current platform
    cmds:
      - task: "{{OS}}:build"
        vars:
          PRODUCTION: '{{.PRODUCTION | default "true"}}'
          ARCH: '{{.ARCH | default ARCH}}'
          APP_VERSION: '{{.APP_VERSION}}'

  package:
    summary: Packages a production build for the current platform
    cmds:
      - task: "{{OS}}:package"
        vars:
          APP_VERSION: '{{.APP_VERSION}}'
          ARCH: '{{.ARCH | default ARCH}}'

  package:linux:amd64:
    summary: Linux amd64 packages (binary, deb, rpm, AppImage, Flatpak)
    cmds:
      - task: linux:package
        vars:
          ARCH: amd64
          APP_VERSION: '{{.APP_VERSION}}'

  package:linux:arm64:
    summary: Linux arm64 packages (binary, deb, rpm, AppImage, Flatpak)
    cmds:
      - task: linux:package
        vars:
          ARCH: arm64
          APP_VERSION: '{{.APP_VERSION}}'


  package:linux:flatpak:
    summary: Linux Flatpak bundle for current arch
    cmds:
      - task: linux:create:flatpak
        vars:
          ARCH: '{{.ARCH | default ARCH}}'
          APP_VERSION: '{{.APP_VERSION}}'

  package:windows:amd64:
    summary: Windows amd64 installer + exe
    cmds:
      - task: windows:package
        vars:
          ARCH: amd64
          APP_VERSION: '{{.APP_VERSION}}'

  package:windows:arm64:
    summary: Windows arm64 installer + exe
    cmds:
      - task: windows:package
        vars:
          ARCH: arm64
          APP_VERSION: '{{.APP_VERSION}}'

  package:darwin:universal:
    summary: macOS universal .app bundle
    cmds:
      - task: darwin:package:universal
        vars:
          APP_VERSION: '{{.APP_VERSION}}'

  dev:
    summary: Run application in development mode
    cmds:
      - cmd: PATH="$HOME/.govm/go/bin:$PATH" CGO_ENABLED=1 wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
        platforms: [linux]
      - cmd: PATH="$HOME/.govm/go/bin:$PATH" wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}
        platforms: [darwin]
      - cmd: powershell -NoProfile -Command "$env:PATH=\"$env:USERPROFILE\.govm\go\bin;$env:PATH\"; wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}"
        platforms: [windows]

  compile:
    summary: Production build for the current platform
    cmds:
      - task: build
        vars:
          PRODUCTION: "true"

  lint:
    summary: Run golangci-lint with the same version and flags as CI
    vars:
      GOLANGCI_LINT_VERSION: '{{.GOLANGCI_LINT_VERSION | default "v2.12.2"}}'
    cmds:
      - |
        set -euo pipefail
        if ! command -v golangci-lint >/dev/null 2>&1; then
          echo "golangci-lint not found; install with: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_LINT_VERSION}}"
          exit 1
        fi
        golangci-lint version
        golangci-lint run --timeout 5m ./...

  fmt:
    summary: Format Go code (golangci formatters + goimports-reviser)
    cmds:
      - golangci-lint run --fix ./...
      - goimports-reviser -rm-unused -format ./...

  test:
    summary: Backend tests with race + CI coverage gate (>=90%)
    cmds:
      - |
        set -euo pipefail
        go test -race -coverprofile=coverage.out -covermode=atomic \
          -coverpkg=./internal/...,./pkg/... ./internal/... ./pkg/...
        go tool cover -func=coverage.out | tee coverage.func.txt
        go tool cover -func=coverage.out | grep total | awk '{if ($3+0 < 90) { print "coverage below 90%:", $3; exit 1 }}'

  test:frontend:
    summary: Frontend checks matching CI (source limits, bundle budget, vitest)
    dir: frontend
    cmds:
      - npm run check:source-limits
      - npm run check:bundle-budget
      - npm test

  test:e2e:
    summary: Run real SSH/tmux/SFTP integration tests
    cmds:
      - go test -race -tags=e2e ./e2e -run 'TestCommercialSSHWorkflow|TestConcurrentResourcesReturnToBaseline' -count=1 -timeout=2m

  benchmark:
    summary: Run commercial performance benchmarks
    cmds:
      - go test -run '^$' -bench 'BenchmarkCommercial' -benchmem ./internal/store ./internal/service

  ci:
    summary: Full local gate aligned with .github/workflows/ci.yml
    desc: |
      Mirrors CI: golangci-lint, backend race+coverage, frontend checks, production build.
      Run before every commit/push. Fails fast on the first failing stage.
    cmds:
      - task: lint
      - task: test
      - task: test:frontend
      - task: build
        vars:
          PRODUCTION: "true"

  check:
    summary: Alias for task ci (pre-commit / pre-push gate)
    cmds:
      - task: ci

  clean:
    summary: Clean temporary build artifacts
    cmds:
      - cmd: rm -f coverage.out coverage.func.txt
        platforms: [linux, darwin]
      - cmd: rm -rf bin build/bin
        platforms: [linux, darwin]
      - cmd: powershell -NoProfile -Command "Remove-Item coverage.out,coverage.func.txt,bin,build/bin -Recurse -Force -ErrorAction SilentlyContinue"
        platforms: [windows]
      - go clean -testcache
