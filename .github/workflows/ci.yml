name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest
      - name: Ensure frontend embed assets
        run: |
          mkdir -p frontend/dist
          if [ ! -f frontend/dist/placeholder.txt ]; then
            printf '%s\n' 'mssh frontend embed placeholder' > frontend/dist/placeholder.txt
            chmod 600 frontend/dist/placeholder.txt
          fi
      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          golangci-lint version
          golangci-lint run --timeout 5m ./...
      - name: Test with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic -coverpkg=./internal/...,./pkg/... ./internal/... ./pkg/...
          go tool cover -func=coverage.out | grep total | awk '{if ($3+0 < 90) exit 1}'
      - name: Frontend test
        run: |
          cd frontend && npm install
          npm run check:source-limits
          npm run check:bundle-budget
          npm test
      - name: Build
        run: wails3 build
