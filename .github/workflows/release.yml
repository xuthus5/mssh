name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.26.x'
  NODE_VERSION: '20'
  WAILS_VERSION: 'v3.0.0-alpha2.117'

jobs:
  linux:
    name: Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            goarch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Linux package tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-4-dev libwebkitgtk-6.0-dev libwebkitgtk-6.0-4 rpm file libfuse2 fuse3 desktop-file-utils wget flatpak flatpak-builder ostree appstream
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
      - name: Stamp package metadata
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version: .*/version: \"${VERSION}\"/" build/config.yml
          sed -i "s/^version: \".*\"/version: \"${VERSION}\"/" build/linux/nfpm/nfpm.yaml
      - name: Build and package
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          CGO_ENABLED: 1
          GOARCH: ${{ matrix.goarch }}
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "1"
        run: |
          set -euo pipefail
          wails3 task linux:build ARCH=${{ matrix.goarch }} PRODUCTION=true APP_VERSION=${APP_VERSION}
          wails3 task linux:generate:dotdesktop
          wails3 task linux:generate:deb ARCH=${{ matrix.goarch }} APP_VERSION=${APP_VERSION}
          wails3 task linux:generate:rpm ARCH=${{ matrix.goarch }} APP_VERSION=${APP_VERSION}

          # AppImage is a required Linux release asset.
          wails3 task linux:create:appimage ARCH=${{ matrix.goarch }} APP_VERSION=${APP_VERSION}

          # Flatpak bundle (GNOME Platform). Soft-fail if runtime pull/build is unavailable in the runner.
          wails3 task linux:create:flatpak ARCH=${{ matrix.goarch }} APP_VERSION=${APP_VERSION} || {
            echo "WARNING: Flatpak packaging failed; continuing release without .flatpak" >&2
          }
      - name: Collect artifacts
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          mkdir -p dist
          cp "bin/mssh" "dist/mssh-${VERSION}-linux-${ARCH}"

          # Normalize package filenames so release assets include version + arch.
          mapfile -t debs < <(find bin -maxdepth 1 -type f -name '*.deb' | sort)
          mapfile -t rpms < <(find bin -maxdepth 1 -type f -name '*.rpm' | sort)
          mapfile -t appimages < <(find bin -maxdepth 1 -type f \( -name '*.AppImage' -o -name '*.appimage' \) | sort)

          if [[ ${#debs[@]} -eq 0 || ${#rpms[@]} -eq 0 ]]; then
            echo "Missing deb/rpm packages in bin/" >&2
            ls -la bin || true
            exit 1
          fi

          cp "${debs[0]}" "dist/mssh-${VERSION}-linux-${ARCH}.deb"
          cp "${rpms[0]}" "dist/mssh-${VERSION}-linux-${ARCH}.rpm"

          # Prefer versioned AppImage if present; otherwise rename any generated AppImage.
          appimage_src=""
          if [[ ${#appimages[@]} -gt 0 ]]; then
            for f in "${appimages[@]}"; do
              base="$(basename "$f")"
              case "$base" in
                linuxdeploy*) continue ;;
                mssh-*.AppImage|mssh-*.appimage) appimage_src="$f"; break ;;
                mssh.AppImage|mssh.appimage) appimage_src="$f" ;;
                *.AppImage|*.appimage) appimage_src="${appimage_src:-$f}" ;;
              esac
            done
          fi
          if [[ -z "${appimage_src}" ]]; then
            echo "Missing AppImage in bin/" >&2
            ls -la bin || true
            exit 1
          fi
          cp "${appimage_src}" "dist/mssh-${VERSION}-linux-${ARCH}.AppImage"
          chmod 0755 "dist/mssh-${VERSION}-linux-${ARCH}.AppImage"

          mapfile -t flatpaks < <(find bin -maxdepth 1 -type f -name '*.flatpak' | sort)
          flatpak_src=""
          if [[ ${#flatpaks[@]} -gt 0 ]]; then
            for f in "${flatpaks[@]}"; do
              base="$(basename "$f")"
              case "$base" in
                mssh-*.flatpak) flatpak_src="$f"; break ;;
                mssh.flatpak) flatpak_src="$f" ;;
                *.flatpak) flatpak_src="${flatpak_src:-$f}" ;;
              esac
            done
          fi
          if [[ -n "${flatpak_src}" ]]; then
            cp "${flatpak_src}" "dist/mssh-${VERSION}-linux-${ARCH}.flatpak"
          else
            echo "WARNING: Flatpak bundle missing in bin/" >&2
            ls -la bin || true
          fi

          ls -la bin dist
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  windows:
    name: Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            goarch: amd64
          - arch: arm64
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install NSIS
        run: choco install nsis -y
      - name: Install Wails CLI
        shell: bash
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
      - name: Resolve version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Stamp package metadata
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"0.1.0\"/\"${VERSION}\"/g" build/windows/info.json
          sed -i "s/version=\"0.1.0\"/version=\"${VERSION}\"/" build/windows/wails.exe.manifest
          sed -i "s/!define INFO_PRODUCTVERSION \"0.1.0\"/!define INFO_PRODUCTVERSION \"${VERSION}\"/" build/windows/nsis/wails_tools.nsh || true
      - name: Build and package
        shell: bash
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          wails3 task windows:build ARCH=${{ matrix.goarch }} PRODUCTION=true APP_VERSION=${APP_VERSION}
          # NSIS installer if makensis is available
          if command -v makensis >/dev/null 2>&1; then
            wails3 task windows:create:nsis:installer ARCH=${{ matrix.goarch }} APP_VERSION=${APP_VERSION} || true
          fi
      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          mkdir -p dist
          if [ -f "bin/mssh.exe" ]; then cp "bin/mssh.exe" "dist/mssh-${VERSION}-windows-${ARCH}.exe"; fi
          find bin -maxdepth 1 -type f -name '*installer*.exe' -exec cp {} dist/ \; || true
          ls -la bin dist || true
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  darwin:
    name: macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: amd64
            runner: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@${{ env.WAILS_VERSION }}
      - name: Resolve version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Stamp package metadata
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for f in build/darwin/Info.plist build/darwin/Info.dev.plist; do
            sed -i.bak "s/0\.1\.0/${VERSION}/g" "$f"
            rm -f "${f}.bak"
          done
      - name: Build macOS app
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          CGO_ENABLED: 1
        run: |
          # Build natively for the runner architecture to avoid brittle CGO cross-compile.
          wails3 task darwin:package ARCH=${{ matrix.arch }} PRODUCTION=true APP_VERSION=${APP_VERSION}
      - name: Collect artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          mkdir -p dist
          if [ -d "bin/mssh.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "bin/mssh.app" "dist/mssh-${VERSION}-darwin-${ARCH}.app.zip"
          fi
          ls -la bin dist || true
      - uses: actions/upload-artifact@v4
        with:
          name: darwin-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: GitHub Release
    needs: [linux, windows, darwin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Flatten artifacts
        run: |
          mkdir -p upload
          find release-assets -type f -print -exec cp {} upload/ \;
          ls -la upload
      - name: Recreate GitHub Release shell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release delete "${{ github.ref_name }}" --yes
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: upload/*
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
